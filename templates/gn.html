<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRB NTPC General Awareness Notes | Current Affairs and History Topics</title>
    <meta name="description" content="Study RRB NTPC General Awareness topics on CGE, including current affairs notes and upcoming history study material for railway exam preparation.">
    <link rel="canonical" href="https://cgew.onrender.com/gn">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="CGE">
    <meta property="og:title" content="RRB NTPC General Awareness Notes">
    <meta property="og:description" content="Browse General Awareness topics for RRB NTPC preparation, including current affairs study notes.">
    <meta property="og:url" content="https://cgew.onrender.com/gn">
    <meta name="twitter:card" content="summary">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:#f2ead5;
            color:#18120d;
            font-family:'Inter',sans-serif;
        }

        .phone-shell{
            width:100%;
            min-height:100vh;
            background:#f2ead5;
        }

        .top-panel{
            background:#1d4630;
            color:#fff;
            padding:20px 32px 28px;
            box-shadow:0 5px 14px rgba(39,30,16,0.24);
        }

        .status-bar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            color:rgba(255,255,255,0.82);
            font-size:22px;
            font-weight:700;
            line-height:1;
            margin-bottom:42px;
        }

        .status-right{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:18px;
        }

        .network{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:1px;
            font-size:10px;
            line-height:0.85;
        }

        .signal{
            display:flex;
            align-items:flex-end;
            gap:3px;
            height:18px;
        }

        .signal span{
            width:4px;
            background:rgba(255,255,255,0.82);
            border-radius:3px;
        }

        .signal span:nth-child(1){ height:6px; }
        .signal span:nth-child(2){ height:10px; }
        .signal span:nth-child(3){ height:14px; }
        .signal span:nth-child(4){ height:18px; }

        .battery{
            width:18px;
            height:28px;
            border:2px solid rgba(255,255,255,0.82);
            border-radius:3px;
            position:relative;
        }

        .battery::before{
            content:"";
            position:absolute;
            top:-5px;
            left:4px;
            width:6px;
            height:3px;
            background:rgba(255,255,255,0.82);
            border-radius:2px 2px 0 0;
        }

        .battery::after{
            content:"";
            position:absolute;
            left:2px;
            right:2px;
            bottom:2px;
            height:52%;
            background:rgba(255,255,255,0.82);
            border-radius:2px;
        }

        .page-title{
            display:flex;
            align-items:center;
            gap:70px;
        }

        .back-btn{
            color:#fff;
            text-decoration:none;
            font-size:48px;
            line-height:1;
            font-weight:300;
            margin-top:-4px;
            width:44px;
            height:44px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:8px;
            transition:background 0.2s ease;
        }

        .back-btn:hover,
        .back-btn:focus-visible{
            background:rgba(255,255,255,0.12);
            outline:none;
        }

        .title-copy h1{
            font-family:'Cinzel',serif;
            font-size:32px;
            line-height:0.92;
            letter-spacing:0;
            text-transform:lowercase;
        }

        .title-copy p{
            color:rgba(255,255,255,0.66);
            font-family:'Cinzel',serif;
            font-size:21px;
            font-weight:700;
            line-height:1.1;
            text-transform:lowercase;
        }

        .content{
            padding:38px 32px 24px;
        }

        .section-title{
            margin-bottom:28px;
        }

        .section-title h2{
            color:#8e4228;
            font-family:'Cinzel',serif;
            font-size:23px;
            font-weight:700;
            letter-spacing:6px;
            line-height:1;
            text-transform:uppercase;
        }

        .underline{
            width:56px;
            height:4px;
            background:#c59a3f;
            margin:14px 0 15px;
        }

        .section-title p{
            color:#766d5f;
            font-family:'Cinzel',serif;
            font-size:22px;
            font-weight:600;
            line-height:1.35;
        }

        .topic-list{
            display:flex;
            flex-direction:column;
            gap:22px;
        }

        .topic-card{
            min-height:198px;
            background:#fffaf0;
            border:3px solid #bba77e;
            border-radius:12px;
            box-shadow:0 3px 9px rgba(63,45,20,0.18);
            display:grid;
            grid-template-columns:8px minmax(0,1fr) 142px;
            overflow:hidden;
            transition:background 0.2s ease, transform 0.2s ease;
        }

        a.topic-card{
            color:inherit;
            text-decoration:none;
        }

        a.topic-card:hover{
            background:#fff5e2;
            transform:translateY(-1px);
        }

        a.topic-card:focus-visible{
            outline:3px solid #c79d4f;
            outline-offset:3px;
        }

        article.topic-card{
            opacity:0.62;
            cursor:not-allowed;
        }

        .accent{
            background:#1f634e;
        }

        .topic-copy{
            padding:28px 20px 24px 30px;
            min-width:0;
        }

        .topic-copy .label{
            color:#627366;
            font-family:'Cinzel',serif;
            font-size:18px;
            font-weight:700;
            letter-spacing:1px;
            margin-bottom:16px;
        }

        .topic-copy h3{
            font-family:'Cinzel',serif;
            font-size:28px;
            line-height:1;
            font-weight:700;
            text-transform:lowercase;
            margin-bottom:24px;
        }

        .image-count{
            display:flex;
            align-items:center;
            gap:10px;
            color:#5a7060;
            font-family:'Cinzel',serif;
            font-size:21px;
            font-weight:700;
        }

        .image-icon{
            width:22px;
            height:22px;
            border:2px solid #5a7060;
            border-radius:2px;
            position:relative;
            flex:0 0 auto;
        }

        .image-icon::before{
            content:"";
            position:absolute;
            left:4px;
            bottom:4px;
            width:6px;
            height:6px;
            background:#5a7060;
            clip-path:polygon(50% 0, 100% 100%, 0 100%);
        }

        .image-icon::after{
            content:"";
            position:absolute;
            right:4px;
            bottom:4px;
            width:9px;
            height:9px;
            background:#5a7060;
            clip-path:polygon(50% 0, 100% 100%, 0 100%);
        }

        .thumbnail{
            background:#fafafa;
            border-left:2px solid #d6c49d;
            position:relative;
            overflow:hidden;
        }

        .news-preview{
            padding:8px;
            display:grid;
            grid-template-columns:1fr 1fr;
            grid-template-rows:20px 58px 42px 42px;
            gap:5px;
        }

        .news-preview::before{
            content:"";
            position:absolute;
            top:10px;
            left:8px;
            right:8px;
            height:16px;
            background:#184e7b;
        }

        .headline{
            grid-column:1 / -1;
            margin-top:22px;
            background:linear-gradient(#141414 0 0) left 0/84% 4px no-repeat,
                       linear-gradient(#141414 0 0) left 9px/68% 4px no-repeat,
                       linear-gradient(#141414 0 0) left 18px/76% 4px no-repeat;
        }

        .photo{
            border-radius:2px;
            background:linear-gradient(135deg,#e3c36b,#255f8a);
        }

        .photo:nth-child(3){
            background:linear-gradient(135deg,#ffe2bb,#3a7d42);
        }

        .photo:nth-child(4){
            background:linear-gradient(135deg,#f7ead7,#7d2f35);
        }

        .photo:nth-child(5){
            background:linear-gradient(135deg,#f1f5de,#2d795c);
        }

        .paper-preview{
            padding:12px 14px;
            background:#fff;
        }

        .paper-top{
            height:18px;
            border-bottom:1px solid #a1a1a1;
            margin-bottom:12px;
        }

        .paper-lines{
            display:flex;
            flex-direction:column;
            gap:9px;
        }

        .paper-lines span{
            height:3px;
            background:#b4b4b4;
        }

        .paper-lines span:nth-child(1){ width:78%; }
        .paper-lines span:nth-child(2){ width:55%; }
        .paper-lines span:nth-child(3){ width:86%; }
        .paper-lines span:nth-child(4){ width:62%; }
        .paper-lines span:nth-child(5){ width:92%; }
        .paper-lines span:nth-child(6){ width:48%; }

        .home-indicator{
            position:fixed;
            left:50%;
            bottom:10px;
            width:240px;
            height:7px;
            transform:translateX(-50%);
            background:#78756d;
            border-radius:99px;
        }

        @media(max-width:520px){
            .top-panel{
                padding:18px 32px 28px;
            }

            .status-bar{
                margin-bottom:38px;
            }

            .page-title{
                gap:64px;
            }

            .title-copy h1{
                font-size:30px;
            }

            .title-copy p{
                font-size:20px;
            }

            .content{
                padding:38px 32px 22px;
            }

            .topic-card{
                min-height:198px;
                grid-template-columns:8px minmax(0,1fr) 142px;
            }
        }

        @media(max-width:390px){
            .top-panel,
            .content{
                padding-left:18px;
                padding-right:18px;
            }

            .page-title{
                gap:32px;
            }

            .title-copy h1{
                font-size:26px;
            }

            .section-title p{
                font-size:19px;
            }

            .topic-card{
                grid-template-columns:7px minmax(0,1fr) 108px;
            }

            .topic-copy{
                padding-left:22px;
            }

            .topic-copy h3{
                font-size:24px;
            }
        }
    </style>
</head>

<body>
    <div class="phone-shell">
        <header class="top-panel">
            <div class="page-title">
                <a href="/subjects" class="back-btn" aria-label="Back to subjects">&lt;</a>
                <div class="title-copy">
                    <h1>general awareness</h1>
                    <p>rrb ntpc</p>
                </div>
            </div>
        </header>

        <main class="content">
            <section class="section-title">
                <h2>Topics</h2>
                <div class="underline"></div>
                <p>2 topics in general awareness</p>
            </section>

            <section class="topic-list" aria-label="General awareness topics">
                <a href="/current-affairs" class="topic-card">
                    <div class="accent"></div>
                    <div class="topic-copy">
                        <p class="label">Topic 1</p>
                        <h3>current affairs</h3>
                        <p class="image-count"><span class="image-icon" aria-hidden="true"></span>2 images</p>
                    </div>
                    <div class="thumbnail news-preview" aria-hidden="true">
                        <div class="headline"></div>
                        <div class="photo"></div>
                        <div class="photo"></div>
                        <div class="photo"></div>
                        <div class="photo"></div>
                    </div>
                </a>

                <article class="topic-card" aria-disabled="true">
                    <div class="accent"></div>
                    <div class="topic-copy">
                        <p class="label">Topic 2</p>
                        <h3>history</h3>
                        <p class="image-count"><span class="image-icon" aria-hidden="true"></span>6 images</p>
                    </div>
                    <div class="thumbnail paper-preview" aria-hidden="true">
                        <div class="paper-top"></div>
                        <div class="paper-lines">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </article>
            </section>
        </main>

        <div class="home-indicator" aria-hidden="true"></div>
    </div>
</body>

</html>
